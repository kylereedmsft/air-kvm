<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AirKVM BLE Bridge</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 16px;
        color: #1f1f1f;
      }
      button {
        padding: 8px 12px;
        font-size: 14px;
      }
      #status {
        margin-top: 10px;
        font-size: 13px;
      }
      #log {
        margin-top: 12px;
        border: 1px solid #d0d0d0;
        border-radius: 6px;
        background: #f7f7f7;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.35;
        height: 220px;
        min-height: 120px;
        max-height: 75vh;
        resize: vertical;
        overflow: auto;
      }
      .log-row {
        padding: 4px 8px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .log-row:nth-child(odd) {
        background: #fcfcfc;
      }
      .log-row:nth-child(even) {
        background: #f1f3f4;
      }
      #log-controls {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      #toggle-autoscroll {
        padding: 6px 10px;
      }
    </style>
  </head>
  <body>
    <h3>AirKVM BLE Bridge</h3>
    <p>Keep this tab open in Edge while using AirKVM.</p>
    <div>
      <button id="connect">Connect BLE</button>
      <button id="disconnect">Disconnect</button>
      <button id="forget">Forget Saved Device</button>
      <button id="reconnect">Reconnect (Chooser)</button>
    </div>
    <div id="status">Disconnected</div>
    <div id="log-controls">
      <button id="clear-log">Clear Log</button>
      <button id="toggle-autoscroll" aria-pressed="true">Auto-scroll: ON</button>
    </div>
    <div id="log"></div>
    <script type="module" src="./ble_bridge.js"></script>
  </body>
  </html>
